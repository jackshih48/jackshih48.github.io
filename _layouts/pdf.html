layout: default

<h1>{{ page.title }}</h1>

{% if page.description %}
<p>{{ page.description }}</p>
{% endif %}

<p>
  <a href="{{ page.pdf | relative_url }}" target="_blank">開新頁看 PDF</a>
</p>

<embed
  src="{{ page.pdf | relative_url }}"
  type="application/pdf"
  width="100%"
  height="900px"
/>
